name: Website CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '10 8 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ============================
  # Suppression Governance Review
  # ============================
  suppression-review:
    name: Suppression Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review suppressions expiring within 14 days
        id: review
        run: |
          if [ ! -f .trivyignore ]; then
            echo ".trivyignore is required"
            exit 1
          fi

          WINDOW_DAYS=14
          WINDOW_END=$(date -u -d "+${WINDOW_DAYS} days" +%s)
          REPORT="trivyignore-expiry-report.txt"
          COUNT=0

          {
            echo "Trivy suppression expiry report"
            echo "Generated (UTC): $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "Window: next ${WINDOW_DAYS} days"
            echo
          } > "$REPORT"

          while IFS= read -r line; do
            if [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]]; then
              continue
            fi

            EXPIRES=$(echo "$line" | sed -nE 's/.*expires:([0-9]{4}-[0-9]{2}-[0-9]{2}).*/\1/p')
            if [ -z "$EXPIRES" ]; then
              continue
            fi

            EXPIRES_EPOCH=$(date -u -d "$EXPIRES" +%s)
            if [ "$EXPIRES_EPOCH" -le "$WINDOW_END" ]; then
              COUNT=$((COUNT + 1))
              echo "$line" >> "$REPORT"
              echo "::warning title=Suppression expiring soon::$line"
            fi
          done < .trivyignore

          if [ "$COUNT" -eq 0 ]; then
            echo "No suppressions expiring in the next ${WINDOW_DAYS} days." >> "$REPORT"
          fi

          echo "warn_count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Enforce scheduled suppression review
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ steps.review.outputs.warn_count }}" -gt 0 ]; then
            echo "Found suppressions expiring within 14 days. Please review/renew/remove."
            exit 1
          fi

      - name: Upload suppression review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-trivyignore-expiry-report
          path: trivyignore-expiry-report.txt
          retention-days: 30

  # ============================
  # Security Audit
  # ============================
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: NPM audit
        run: npm audit --audit-level=high --omit=dev

  # ============================
  # Lint
  # ============================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ============================
  # Tests
  # ============================
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  # ============================
  # IaC / Misconfiguration Scan
  # ============================
  iac:
    name: IaC Scan (Trivy Misconfig)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate .trivyignore governance
        run: |
          if [ ! -f .trivyignore ]; then
            echo ".trivyignore is required"
            exit 1
          fi

          INVALID=$(grep -nEv '^\s*(#.*)?$|^[A-Za-z0-9_.:-]+\s+#\s+SEC-[0-9]+\s+owner:[A-Za-z0-9._-]+\s+expires:[0-9]{4}-[0-9]{2}-[0-9]{2}\s+reason:.+$' .trivyignore || true)
          if [ -n "$INVALID" ]; then
            echo "Invalid .trivyignore entries found:"
            echo "$INVALID"
            echo "Expected format: <FINDING_ID> # SEC-1234 owner:username expires:YYYY-MM-DD reason:..."
            exit 1
          fi

          TODAY_EPOCH=$(date -u +%s)
          while IFS= read -r line; do
            if [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]]; then
              continue
            fi

            EXPIRES=$(echo "$line" | sed -nE 's/.*expires:([0-9]{4}-[0-9]{2}-[0-9]{2}).*/\1/p')
            if [ -z "$EXPIRES" ]; then
              continue
            fi

            EXPIRES_EPOCH=$(date -u -d "$EXPIRES" +%s)
            if [ "$EXPIRES_EPOCH" -lt "$TODAY_EPOCH" ]; then
              echo "Expired suppression found: $line"
              echo "Suppression expiry must be today or future"
              exit 1
            fi
          done < .trivyignore

      - name: Trivy misconfiguration scan (fail on high/critical)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'misconfig'
          trivyignores: '.trivyignore'
          format: 'sarif'
          output: 'trivy-iac.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Trivy misconfiguration scan (json artifact)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'misconfig'
          trivyignores: '.trivyignore'
          format: 'json'
          output: 'trivy-iac.json'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload IaC SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-iac.sarif'

      - name: Upload IaC artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-iac-report
          path: |
            trivy-iac.sarif
            trivy-iac.json
          retention-days: 30

  # ============================
  # Build
  # ============================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [audit, test, iac]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: .next
          retention-days: 7
